<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fraser McGill | FIFA World Cup 2026!</title>
<style>
:root {
  --bg:#29779b;--bg2:#29779b;--bg3:#29779b;--bg4:#29779b;
  --blue:#29779b;--orange:#f5b75e;--storm:#29779b;
  --text:#1a1a1a;--muted:#4a6070;--border:rgba(0,0,0,0.1);
  --green:#1a8a4a;--red:#d63b3b;
  --blue-light:#29779b;--header-bg:#29779b;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column;font-size:13px;}
#hdr{display:flex;align-items:center;justify-content:center;gap:16px;padding:0 20px;height:56px;background:#29779b;border-bottom:none;flex-shrink:0;position:relative;}
.hdr-brand{display:flex;align-items:center;gap:10px;}
.hdr-brand img{height:36px;width:36px;border-radius:50%;background:#fff;padding:2px;box-shadow:0 0 0 1px rgba(255,255,255,0.3);}
.t1{font-size:18px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:#fff;}
.t2{font-size:10px;color:rgba(255,255,255,0.7);letter-spacing:.06em;text-transform:uppercase;}
.hdr-badge{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.4);border-radius:5px;padding:4px 14px;font-size:11px;color:#fff;font-weight:700;letter-spacing:.06em;text-transform:uppercase;}
#clock{font-size:20px;font-weight:700;color:#fff;font-variant-numeric:tabular-nums;position:absolute;right:24px;}
#pbar{height:3px;background:var(--bg3);flex-shrink:0;}
.dlabel:first-child{margin-top:0;}
#prog{height:100%;background:rgba(0,0,0,0.2);width:100%;transition:none;}
#body{flex:1;display:grid;grid-template-columns:1fr 1fr 1.15fr;gap:1px;background:rgba(0,0,0,0.1);min-height:0;}
#left{display:flex;flex-direction:column;background:#29779b;min-height:0;}
#fix-panel{flex:1.1;display:flex;flex-direction:column;border-bottom:1px solid rgba(0,0,0,0.15);min-height:0;}
#res-panel{flex:.9;display:flex;flex-direction:column;min-height:0;}
#mid{background:#e8f2f7;display:flex;flex-direction:column;min-height:0;}
#right{background:#e8f2f7;display:flex;flex-direction:column;min-height:0;}
.ph{display:flex;align-items:center;gap:8px;padding:11px 16px;border-bottom:none;background:#1b2026;flex-shrink:0;padding:13px 16px;}
.ph h2{font-size:15px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#fff;}
.pill{margin-left:auto;font-size:9px;font-weight:700;letter-spacing:.08em;background:rgba(245,183,94,.12);color:var(--orange);border:1px solid rgba(245,183,94,.3);border-radius:3px;padding:2px 6px;text-transform:uppercase;}
.pb{flex:1;overflow-y:auto;min-height:0;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,0.3) transparent;}
.pb::-webkit-scrollbar{width:3px;}
.pb::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.3);border-radius:2px;}
.dlabel{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#fff;padding:7px 14px;border-bottom:none;border-radius:0;position:sticky;top:0;background:#2e3d4f;z-index:1;margin-top:8px;display:block;}
.fx{display:grid;grid-template-columns:36px 1fr 62px 1fr 80px;align-items:center;padding:5px 8px;border-bottom:1px solid rgba(255,255,255,0.15);gap:4px;}
.fx:last-child{border-bottom:none;}
.fx-home{text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;}
.fx-away{text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;}
.fx-grp-col{font-size:9px;font-weight:700;color:rgba(255,255,255,0.95);text-align:left;white-space:nowrap;background:rgba(0,0,0,0.15);border-radius:3px;padding:2px 4px;}
.fx-venue-col{font-size:9px;color:rgba(255,255,255,0.8);text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-style:italic;}
.fx-flag{font-size:18px;display:block;line-height:1;}.fx-flag img{width:28px!important;height:21px!important;display:block!important;border-radius:2px;}
.fx-name{font-size:12px;font-weight:600;color:#fff;display:block;}
.fx-grp{font-size:9px;color:rgba(255,255,255,0.6);display:block;}
.fx-mid{text-align:center;display:flex;flex-direction:column;align-items:center;}
.fx-score{display:inline-block;background:#fff;border:2px solid #29779b;border-radius:4px;padding:3px 7px;font-size:12px;font-weight:700;color:#1b2026;font-variant-numeric:tabular-nums;white-space:nowrap;}
.fx-score.live{border-color:var(--orange);color:var(--orange);}
.fx-time{font-size:9px;color:rgba(255,255,255,0.75);display:block;margin-top:2px;font-weight:600;letter-spacing:.05em;}
.fx-time.lt{color:var(--orange);}

.fx-sa{background:rgba(255,220,100,0.18);border-left:3px solid #f5b75e;}
.sa-name{color:#f5e87a!important;font-weight:700!important;}

/* GROUP TABLES */
.grp-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;padding:6px 8px;background:#29779b;}
.grp-box{background:#ffffff;border-radius:4px;overflow:hidden;border:none;}
.grp-lbl{background:#2e3d4f;color:#fff;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:5px 8px;}
.grp-box table{width:100%;border-collapse:collapse;font-size:11px;}
.grp-box th{color:#6b7280;font-weight:600;padding:3px 4px;text-align:center;font-size:10px;}
.grp-box th:first-child{text-align:left;padding-left:5px;}
.grp-box td{padding:3px 4px;text-align:center;color:#1a1a1a;border-top:1px solid rgba(0,0,0,0.06);}.grp-box td img{width:16px!important;height:12px!important;vertical-align:middle!important;display:inline!important;}
.grp-box td:first-child{text-align:left;padding-left:6px;font-weight:700;font-size:11px;color:#1a1a1a;}
.grp-box tr.q1 td:first-child{border-left:3px solid #1a6b2a;}
.grp-box tr.q2 td:first-child{border-left:3px solid #2d9e45;}
.pts{font-weight:700;color:#29779b;}

/* LEADERBOARD */
.lb-hdr{display:grid;grid-template-columns:28px 1fr 36px 36px 36px 40px;align-items:center;gap:4px;padding:5px 10px;border-bottom:1px solid rgba(255,255,255,0.12);}
.lb-hdr span{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);text-align:center;}
.lb-hdr span:nth-child(2){text-align:left;}
.lb{display:grid;grid-template-columns:28px 1fr 36px 36px 36px 40px;align-items:center;gap:4px;padding:5px 10px;border-bottom:1px solid var(--border);}
.lb:last-child{border-bottom:none;}
.lb.top1{background:rgba(245,183,94,.05);}
.lb-rank{font-size:11px;font-weight:700;color:var(--muted);text-align:center;}
.lb-rank.g{color:var(--orange);font-size:13px;}
.lb-rank.s{color:#c8c8c8;}
.lb-rank.b{color:#cd7f32;}
.lb-name{font-size:11px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lb-cell{font-size:11px;font-weight:600;text-align:center;color:var(--text);}
.lb-pts-cell{font-size:12px;font-weight:700;color:var(--orange);text-align:center;font-variant-numeric:tabular-nums;}

#widget-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:16px;}
.widget-hint{font-size:11px;color:var(--muted);text-align:center;line-height:1.7;max-width:200px;}
.widget-code{font-size:9px;font-family:monospace;background:var(--bg3);color:var(--blue);border-radius:4px;padding:6px 10px;text-align:center;}
#ftr{display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:26px;background:#29779b;border-top:none;font-size:9px;color:rgba(255,255,255,0.75);flex-shrink:0;}
.ftr-s{display:flex;align-items:center;gap:5px;}
.sdot{width:5px;height:5px;border-radius:50%;background:var(--muted);}
.sdot.ok{background:var(--green);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>

function toSAST(utcStr){
  const d=new Date(utcStr);
  return d.toLocaleTimeString('en-ZA',{timeZone:'Africa/Johannesburg',hour:'2-digit',minute:'2-digit',hour12:false});
}
function toSASTDateLabel(utcStr){
  const d=new Date(utcStr);
  return d.toLocaleDateString('en-ZA',{timeZone:'Africa/Johannesburg',weekday:'short',day:'numeric',month:'short'});
}
function gd(t){const v=t.gf-t.ga;return(v>0?'+':'')+v;}
function sortGrp(t){return[...t].sort((a,b)=>{if(b.pts!==a.pts)return b.pts-a.pts;const ga=a.gf-a.ga,gb=b.gf-b.ga;if(gb!==ga)return gb-ga;return b.gf-a.gf;});}

function renderGroups(){
  let h='';
  GROUPS.forEach(g=>{
    const s=sortGrp(g.teams);
    h+=`<div class="grp-box"><div class="grp-lbl">Group ${g.name}</div>
      <table><thead><tr><th>Team</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GD</th><th>Pts</th></tr></thead><tbody>`;
    s.forEach((t,i)=>{
      h+=`<tr class="${i===0?'q1':i===1?'q2':''}">
        <td>${t.f} ${t.n}</td><td>${t.p}</td><td>${t.w}</td><td>${t.d}</td><td>${t.l}</td>
        <td>${gd(t)}</td><td class="pts">${t.pts}</td></tr>`;
    });
    h+='</tbody></table></div>';
  });
  document.getElementById('grp-grid').innerHTML=h;
}

function isSA(f){ return f.h==='South Africa'||f.a==='South Africa'; }

function renderFixtures(){
  const up=FIXTURES.filter(f=>f.s==='S'||f.s==='L');
  up.sort((a,b)=>new Date(a.utc)-new Date(b.utc));
  const bd={};
  up.forEach(f=>{const l=toSASTDateLabel(f.utc);(bd[l]=bd[l]||[]).push(f);});
  let h='',live=false;
  Object.keys(bd).slice(0,6).forEach(d=>{
    h+=`<div class="dlabel">${d}</div>`;
    bd[d].forEach(f=>{
      if(f.s==='L')live=true;
      const sa=isSA(f);
      const sc=f.s==='L'
        ?`<span class="fx-score live">${f.sc}</span><span class="fx-time lt">LIVE</span>`
        :`<span class="fx-score">${toSAST(f.utc)}</span>`;
      h+=`<div class="fx${sa?' fx-sa':''}">
        <div class="fx-grp-col">Grp ${f.g}</div>
        <div class="fx-home"><span class="fx-flag">${f.hf}</span><span class="fx-name${sa?' sa-name':''}">${f.h}</span></div>
        <div class="fx-mid">${sc}</div>
        <div class="fx-away"><span class="fx-flag">${f.af}</span><span class="fx-name${sa?' sa-name':''}">${f.a}</span></div>
        <div class="fx-venue-col">${f.v}</div>
      </div>`;
    });
  });
  document.getElementById('fix-list').innerHTML=h||'<div style="padding:16px;color:var(--muted);font-size:11px;text-align:center">No upcoming fixtures</div>';
  document.getElementById('live-pill').style.display=live?'inline-block':'none';
}

function renderResults(){
  const fin=FIXTURES.filter(f=>f.s==='F');
  fin.sort((a,b)=>new Date(b.utc)-new Date(a.utc));
  const bd={};
  fin.forEach(f=>{const l=toSASTDateLabel(f.utc);(bd[l]=bd[l]||[]).push(f);});
  let h='';
  Object.keys(bd).slice(0,5).forEach(d=>{
    h+=`<div class="dlabel">${d}</div>`;
    bd[d].forEach(f=>{
      const sa=isSA(f);
      h+=`<div class="fx${sa?' fx-sa':''}">
        <div class="fx-grp-col">Grp ${f.g}</div>
        <div class="fx-home"><span class="fx-flag">${f.hf}</span><span class="fx-name${sa?' sa-name':''}">${f.h}</span></div>
        <div class="fx-mid"><span class="fx-score">${f.sc}</span><span class="fx-time">FT</span></div>
        <div class="fx-away"><span class="fx-flag">${f.af}</span><span class="fx-name${sa?' sa-name':''}">${f.a}</span></div>
        <div class="fx-venue-col">${f.v}</div>
      </div>`;
    });
  });
  document.getElementById('res-list').innerHTML=h||'<div style="padding:16px;color:var(--muted);font-size:11px;text-align:center">No results yet</div>';
}

function renderLB(){
  let h='';
  LB.forEach((e,i)=>{
    const r=i+1;
    const rc=r===1?'g':r===2?'s':r===3?'b':'';
    const ri=r===1?'&#9733;':r;
    h+=`<div class="lb${r===1?' top1':''}">
      <div class="lb-rank ${rc}">${ri}</div>
      <div class="lb-name">${e.n}</div>
      <div class="lb-cell">${e.res}</div>
      <div class="lb-cell">${e.cl}</div>
      <div class="lb-cell">${e.ex}</div>
      <div class="lb-pts-cell">${e.pts}</div>
    </div>`;
  });
  document.getElementById('lb-list').innerHTML=h;
}

function tick(){
  const t=new Date().toLocaleTimeString('en-ZA',{timeZone:'Africa/Johannesburg',hour:'2-digit',minute:'2-digit',hour12:false});
  document.getElementById('clock').textContent=t;
}
setInterval(tick,1000);tick();

async function tryAPI(){
  try{
    const r=await fetch('https://worldcup26.ir/get/games',{signal:AbortSignal.timeout(5000)});
    if(!r.ok)throw new Error();
    const data=await r.json();
    if(Array.isArray(data)&&data.length>0){
      // update statuses if API returns live/finished
      setStatus('ok','Live data active');
    }
  }catch(e){setStatus('','Cached data');}
}

function setStatus(c,m){
  document.getElementById('api-dot').className='sdot'+(c?' '+c:'');
  document.getElementById('api-txt').textContent=m;
}
function setLastUpd(){
  const t=new Date().toLocaleTimeString('en-ZA',{timeZone:'Africa/Johannesburg',hour:'2-digit',minute:'2-digit',hour12:false});
  document.getElementById('last-upd').textContent='Updated '+t+' SAST';
}
function startBar(){
  const b=document.getElementById('prog');
  b.style.transition='none';b.style.width='100%';
  setTimeout(()=>{b.style.transition=`width ${REFRESH_MS}ms linear`;b.style.width='0%';},80);
}
async function refresh(){
  await tryAPI();
  renderFixtures();renderResults();renderGroups();
  setLastUpd();startBar();
}
refresh();
setInterval(refresh,REFRESH_MS);
